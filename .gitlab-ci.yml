image: docker:latest

services:
  - docker:dind

stages:
  - build

build_image:
  stage: build
  only:
    refs:
    - master
  script:
    - docker login --username $CI_REGISTRY_USERNAME --password $CI_REGISTRY_PASSWORD registry.gitlab.com
    - docker build -t registry.gitlab.com/paunin/paunin_com . -f Dockerfile
    - docker push registry.gitlab.com/paunin/paunin_com